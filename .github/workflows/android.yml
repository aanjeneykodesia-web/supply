name: Build Android APK (Upgraded)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # Java for Android
    - name: Setup JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # Disable Gradle wrapper validation error
    - name: Disable Gradle wrapper validation
      run: echo "GRADLE_OPTS=-Dorg.gradle.wrapper.validate=false" >> $GITHUB_ENV

    # Make gradlew executable
    - name: Make gradlew executable
      run: chmod +x android-app/gradlew

    # Build Debug APK
    - name: Build Debug APK
      working-directory: android-app
      run: ./gradlew assembleDebug --no-daemon

    # Upload APK artifact
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SupplyChainApp-APK
        path: android-app/app/build/outputs/apk/debug/app-debug.apk
